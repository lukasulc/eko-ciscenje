name: Scheduled Menu Build

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-data:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.data.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore data hash
        uses: actions/cache/restore@v4
        with:
          path: last-build-hash.txt
          key: data-build-hash-${{ github.run_id }}
          restore-keys: |
            data-build-hash-

      - name: Install dependencies
        run: npm ci

      - name: Check Google Sheet
        id: data
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || vars.SPREADSHEET_ID }}
          GOOGLE_SHEETS_GID: ${{ secrets.GOOGLE_SHEETS_GID || vars.GOOGLE_SHEETS_GID }}
        run: node scripts/deploy-check.mjs

  deploy:
    needs: check-data
    if: needs.check-data.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore data hash
        uses: actions/cache/restore@v4
        with:
          path: last-build-hash.txt
          key: data-build-hash-${{ github.run_id }}
          restore-keys: |
            data-build-hash-

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || vars.SPREADSHEET_ID }}
          GOOGLE_SHEETS_GID: ${{ secrets.GOOGLE_SHEETS_GID || vars.GOOGLE_SHEETS_GID }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Save data hash
        uses: actions/cache/save@v4
        if: success()
        with:
          path: last-build-hash.txt
          key: data-build-hash-${{ github.run_id }}
