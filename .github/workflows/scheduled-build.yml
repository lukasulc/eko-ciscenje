name: Scheduled Menu Build

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  deploy-if-menu-changed:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore menu hash
        uses: actions/cache/restore@v4
        with:
          path: last-build-hash.txt
          key: menu-build-hash-${{ github.run_id }}
          restore-keys: |
            menu-build-hash-

      - name: Install dependencies
        run: npm ci

      - name: Check Google Sheet
        id: menu
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || vars.SPREADSHEET_ID }}
          GOOGLE_SHEETS_GID: ${{ secrets.GOOGLE_SHEETS_GID || vars.GOOGLE_SHEETS_GID }}
        run: node scripts/deploy-check.mjs

      - name: Build site
        if: steps.menu.outputs.changed == 'true'
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || vars.SPREADSHEET_ID }}
          GOOGLE_SHEETS_GID: ${{ secrets.GOOGLE_SHEETS_GID || vars.GOOGLE_SHEETS_GID }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        if: steps.menu.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Save menu hash
        uses: actions/cache/save@v4
        if: steps.menu.outputs.changed == 'true' && success()
        with:
          path: last-build-hash.txt
          key: menu-build-hash-${{ github.run_id }}
